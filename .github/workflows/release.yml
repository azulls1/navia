name: Release & Publish

# Publica `navia-ai` en npm cuando publicas un Release en GitHub.
# Usa Trusted Publishing (OIDC): NO necesita NPM_TOKEN ni códigos 2FA.
#
# Requisito (UNA sola vez) en npmjs.com:
#   1. Entra a https://www.npmjs.com/package/navia-ai → pestaña "Settings".
#   2. Sección "Trusted Publisher" → "GitHub Actions".
#   3. Rellena:  Organization or user = azulls1 · Repository = navia
#                Workflow filename = release.yml · (Environment: vacío)
#   4. Guarda. A partir de ahí, crear un Release en GitHub publica solo, con provenance.
#
# Nota: el publish necesita 2FA en modo "auth-only" (no "auth and writes") para que el
# OIDC del CI pueda publicar sin código. Cámbialo en npmjs.com → Account → Two-Factor.
#
# ESTADO: DESACTIVADO del automático por preferencia del mantenedor (se publica a mano).
# Para activarlo, configura el Trusted Publisher en npmjs.com (ver arriba) y vuelve a poner
# el trigger `release: [published]`. Por ahora solo corre con el botón manual (workflow_dispatch).

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # necesario para Trusted Publishing (OIDC) + provenance

jobs:
  publish:
    name: Publicar en npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
      # npm >= 11.5.1 soporta Trusted Publishing (OIDC).
      - name: Actualizar npm
        run: npm install -g npm@latest
      - run: npm ci
      - run: npm run typecheck
      - name: Instalar Chromium de Playwright (tests de integración)
        run: npx playwright install --with-deps chromium
      - run: npm test
      - run: npm run build
      # Verifica que la versión del tag (vX.Y.Z) coincida con package.json antes de publicar.
      - name: Verificar versión del tag
        if: github.event_name == 'release'
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::El tag ($TAG) no coincide con package.json ($PKG)"; exit 1
          fi
      - name: Publicar (provenance + OIDC, sin token)
        run: npm publish
