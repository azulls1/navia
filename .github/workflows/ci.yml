name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: Subir artefacto de build
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

  smoke:
    name: Smoke test (Chromium, sin API key)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Instalar Chromium de Playwright
        run: npx playwright install --with-deps chromium
      - name: Ejecutar smoke test
        run: node examples/smoke.mjs
